<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You Card</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f0e8;
    font-family: 'Nunito', sans-serif;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    border-radius: 28px;
    width: 100%;
    max-width: 820px;
    min-height: 340px;
    display: flex;
    align-items: center;
    padding: 40px 48px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(255, 180, 0, 0.18), 0 2px 12px rgba(0,0,0,0.07);
    gap: 40px;
  }
  .bg-circle { position: absolute; border-radius: 50%; opacity: 0.13; }
  .bg-circle-1 { width: 220px; height: 220px; background: #FFC107; top: -60px; right: -40px; }
  .bg-circle-2 { width: 140px; height: 140px; background: #FFD740; bottom: -50px; left: 60px; }
  .bg-circle-3 { width: 80px; height: 80px; background: #FFA000; top: 20px; left: 200px; }
  .star { position: absolute; font-size: 20px; opacity: 0.55; animation: twinkle 2.5s ease-in-out infinite; }
  .star:nth-child(4) { top: 18px; left: 340px; font-size: 16px; animation-delay: 0s; }
  .star:nth-child(5) { top: 55px; right: 160px; font-size: 22px; animation-delay: 0.4s; }
  .star:nth-child(6) { bottom: 30px; right: 80px; font-size: 14px; animation-delay: 0.8s; }
  .star:nth-child(7) { bottom: 50px; left: 240px; font-size: 18px; animation-delay: 1.2s; }
  .star:nth-child(8) { top: 30px; left: 120px; font-size: 13px; animation-delay: 0.6s; }
  .star:nth-child(9) { bottom: 20px; right: 300px; font-size: 20px; animation-delay: 1.6s; }
  .star:nth-child(10) { top: 14px; right: 320px; font-size: 12px; animation-delay: 2s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.2); }
  }
  .mascot-wrap {
    flex-shrink: 0;
    width: 160px;
    height: 160px;
    animation: bounce 3s ease-in-out infinite;
  }
  .mascot-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 6px 16px rgba(255,160,0,0.3));
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
  }
  .divider {
    width: 3px;
    height: 160px;
    background: linear-gradient(to bottom, transparent, #FFD740, #FFC107, transparent);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .text-side { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .top-label { font-size: 12px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: #FFA000; }
  .main-heading { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; color: #1a1a1a; line-height: 1.2; }
  .main-heading em { font-style: italic; color: #FFC107; }
  .sub-text { font-size: 15px; color: #888; font-weight: 600; line-height: 1.6; max-width: 380px; }
  .badge-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .badge { background: #FFF8E1; border: 1.5px solid #FFD740; color: #E65100; font-size: 12px; font-weight: 800; padding: 5px 14px; border-radius: 100px; letter-spacing: 0.5px; }
  .dot { position: absolute; border-radius: 50%; background: #FFD740; opacity: 0.25; }
  .dot-1 { width: 12px; height: 12px; top: 80px; right: 48px; }
  .dot-2 { width: 8px; height: 8px; bottom: 60px; right: 140px; opacity: 0.18; }
  .dot-3 { width: 16px; height: 16px; top: 40px; left: 50px; opacity: 0.15; }
  .dot-4 { width: 10px; height: 10px; bottom: 40px; left: 180px; }
</style>
</head>
